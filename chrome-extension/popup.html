<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 370px;
      min-height: 200px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #888;
    }

    /* Toggle Row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      border: 1px solid #1a1a40;
    }

    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }

    .toggle-label small {
      display: block;
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #aaa;
      border-radius: 50%;
      transition: 0.3s;
    }

    .switch input:checked + .slider {
      background: #6c63ff;
    }

    .switch input:checked + .slider:before {
      transform: translateX(20px);
      background: #fff;
    }

    /* Mode Indicator */
    .mode-badge {
      text-align: center;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .mode-badge.auto {
      background: rgba(108, 99, 255, 0.15);
      color: #9d97ff;
      border: 1px solid rgba(108, 99, 255, 0.3);
    }

    .mode-badge.manual {
      background: rgba(255, 255, 255, 0.05);
      color: #888;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 30px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #333;
      border-top: 4px solid #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: #aaa;
    }

    /* Result Card */
    .result-card {
      background: #16213e;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      border: 1px solid #1a1a40;
    }

    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 26px;
      font-weight: bold;
    }

    .score-circle.safe {
      border: 4px solid #00c853;
      color: #00c853;
      box-shadow: 0 0 20px rgba(0, 200, 83, 0.15);
    }

    .score-circle.suspicious {
      border: 4px solid #ffd600;
      color: #ffd600;
      box-shadow: 0 0 20px rgba(255, 214, 0, 0.15);
    }

    .score-circle.phishing {
      border: 4px solid #ff1744;
      color: #ff1744;
      box-shadow: 0 0 20px rgba(255, 23, 68, 0.15);
    }

    .status-label {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status-label.safe { color: #00c853; }
    .status-label.suspicious { color: #ffd600; }
    .status-label.phishing { color: #ff1744; }

    .explanation {
      font-size: 12px;
      color: #bbb;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Score Breakdown */
    .score-breakdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .score-item {
      text-align: center;
    }

    .score-item .label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-item .value {
      font-size: 16px;
      font-weight: bold;
      color: #aaa;
    }

    /* Signals List */
    .signals-list {
      text-align: left;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .signals-title {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .signal-item {
      font-size: 11px;
      padding: 4px 8px;
      margin-bottom: 3px;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
    }

    .signal-item.high {
      color: #ff6b6b;
      border-left: 2px solid #ff4757;
    }

    .signal-item.medium {
      color: #ffd600;
      border-left: 2px solid #ffd600;
    }

    .signal-item.low {
      color: #aaa;
      border-left: 2px solid #666;
    }

    /* AI Analysis Section */
    .ai-section {
      text-align: left;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(108, 99, 255, 0.06);
      border: 1px solid rgba(108, 99, 255, 0.15);
    }

    .ai-section .ai-label {
      font-size: 10px;
      color: #7c75e6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .ai-section .ai-status {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .ai-section .ai-status.safe { color: #00c853; }
    .ai-section .ai-status.suspicious { color: #ffd600; }
    .ai-section .ai-status.phishing { color: #ff1744; }

    .ai-section .ai-reason {
      font-size: 11px;
      color: #b0b0ff;
      line-height: 1.4;
    }

    .ai-fallback {
      font-size: 11px;
      color: #ff9800;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    /* Error / No Content */
    .error-message {
      text-align: center;
      padding: 24px 0;
      color: #ff6b6b;
      font-size: 13px;
    }

    .scan-btn {
      display: block;
      width: 100%;
      padding: 11px;
      margin-top: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .scan-btn:hover {
      background: #5a52d5;
    }

    .scan-btn:disabled {
      background: #3a3a5e;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Phishing Detector</h1>
    <p>Real-time AI-powered phishing protection</p>
  </div>

  <!-- Auto-Detect Toggle -->
  <div class="toggle-row">
    <div class="toggle-label">
      Auto Detect
      <small>Scan emails automatically</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="autoToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="content" style="text-align:center;">
    <div id="modeBadge" class="mode-badge manual">Scan on Click</div>
    <button class="scan-btn" id="scanBtn">Scan This Page</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
